name: Update Repository Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch Repository Data
        env:
          TOKEN: ${{ secrets.GH_ORG_TOKEN }}
          ORG_NAME: GoldrattConsultingIndia
        run: |

          mkdir -p data

          page=1
          allRepos="[]"

          while true
          do
            response=$(curl -s \
              -H "Authorization: token $TOKEN" \
              "https://api.github.com/orgs/$ORG_NAME/repos?type=all&per_page=100&page=$page")

            count=$(echo "$response" | jq length)

            if [ "$count" -eq 0 ]; then
              break
            fi

            allRepos=$(jq -s '.[0] + .[1]' \
              <(echo "$allRepos") \
              <(echo "$response"))

            page=$((page+1))
          done

          echo "$allRepos" > data/repo-data.json

      - name: Commit Updated Data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/repo-data.json

          git diff --cached --quiet || (
            git commit -m "Auto update repository dashboard data"
            git push
          )
