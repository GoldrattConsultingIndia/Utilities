name: Update Repository Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Repository Data
        env:
          TOKEN: ${{ secrets.GH_ORG_TOKEN }}
        run: |

          mkdir -p data

          curl -s \
            -H "Authorization: token $TOKEN" \
            "https://api.github.com/orgs/GoldrattConsultingIndia/repos?type=all&per_page=100" \
            > data/repo-data.json

          echo "Generated repo-data.json"

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/repo-data.json

          git diff --staged --quiet || git commit -m "Update repository data"

          git push
